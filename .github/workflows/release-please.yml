name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  push-release-images:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: rosalindfranklininstitute+github_antigenapp
          password: ${{ secrets.QUAYIO_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            quay.io/rosalindfranklininstitute/antigen-app-${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}},prefix=v,value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},prefix=v,value=${{ needs.release-please.outputs.tag_name }},enable=${{ !contains(needs.release-please.outputs.version, '-') }}
            type=semver,pattern={{major}},prefix=v,value=${{ needs.release-please.outputs.tag_name }},enable=${{ !contains(needs.release-please.outputs.version, '-') }}
            type=raw,value=latest,enable=${{ !contains(needs.release-please.outputs.version, '-') }}

      - name: Build and push prod image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component }}
          target: prod
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
