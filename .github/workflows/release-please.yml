name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  push-release-images:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - name: Checkout Source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Quay.io
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: quay.io
          username: rosalindfranklininstitute+github_antigenapp
          password: ${{ secrets.QUAYIO_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            quay.io/rosalindfranklininstitute/antigen-app-${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}},prefix=v,value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},prefix=v,value=${{ needs.release-please.outputs.tag_name }},enable=${{ !contains(needs.release-please.outputs.version, '-') }}
            type=semver,pattern={{major}},prefix=v,value=${{ needs.release-please.outputs.tag_name }},enable=${{ !contains(needs.release-please.outputs.version, '-') }}
            type=raw,value=latest,enable=${{ !contains(needs.release-please.outputs.version, '-') }}

      - name: Resolve component build args
        id: build-args
        run: |
          if [ "$COMPONENT" = "frontend" ]; then
            printf 'value=VITE_SENTRY_DSN=%s\n' "$FRONTEND_SENTRY_DSN" >> "$GITHUB_OUTPUT"
          fi
        env:
          COMPONENT: ${{ matrix.component }}
          FRONTEND_SENTRY_DSN: ${{ secrets.FRONTEND_SENTRY_DSN }}

      - name: Build and push prod image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ${{ matrix.component }}
          target: prod
          build-args: ${{ steps.build-args.outputs.value }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
