name: Build, test and push dev container

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: ci-dev-${{ github.ref }}-${{ matrix.component }}
      cancel-in-progress: true
    strategy:
      matrix:
        component: [backend, frontend]
    env:
      IMAGE_BASE: quay.io/rosalindfranklininstitute/antigen-app-${{ matrix.component }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to Quay.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: quay.io
          username: rosalindfranklininstitute+github_antigenapp
          password: ${{ secrets.QUAYIO_TOKEN }}

      - name: Build dev image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.component }}
          target: dev
          build-args: |
            UV_SYNC_FLAGS=
          platforms: linux/amd64
          load: true
          tags: ${{ env.IMAGE_BASE }}:dev

      - name: Run backend lint
        if: ${{ matrix.component == 'backend' }}
        run: |
          docker run --rm "${IMAGE_BASE}:dev" sh -c "ruff check . && ruff format --check ."

      - name: Run backend tests
        if: ${{ matrix.component == 'backend' }}
        run: |
          docker run --name backend-tests -e DJANGO_CI=true "${IMAGE_BASE}:dev" python -m pytest
          docker cp backend-tests:/usr/src/cov.xml ./backend/cov.xml
          docker rm backend-tests

      - name: Upload backend coverage to Codecov
        if: ${{ matrix.component == 'backend' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./backend/cov.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Run frontend tests
        if: ${{ matrix.component == 'frontend' }}
        run: |
          docker run --name frontend-tests -e CI=true "${IMAGE_BASE}:dev" sh -c "npx vitest run --coverage && npx prettier --check ."
          docker cp frontend-tests:/antigenapp/coverage/lcov.info ./frontend/lcov.info
          docker rm frontend-tests

      - name: Upload frontend coverage to Codecov
        if: ${{ matrix.component == 'frontend' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./frontend/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Push dev image tags
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          docker push "${IMAGE_BASE}:dev"
