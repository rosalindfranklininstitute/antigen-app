name: Build, test and push dev container

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: ci-dev-${{ github.ref }}-${{ matrix.component }}
      cancel-in-progress: true
    strategy:
      matrix:
        component: [backend, frontend]
    env:
      IMAGE_BASE: quay.io/rosalindfranklininstitute/antigen-app-${{ matrix.component }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay.io
        uses: docker/login-action@v3
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: quay.io
          username: rosalindfranklininstitute+github_antigenapp
          password: ${{ secrets.QUAYIO_TOKEN }}

      - name: Build dev image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component }}
          target: dev
          build-args: |
            UV_SYNC_FLAGS=
          platforms: linux/amd64
          load: true
          tags: ${{ env.IMAGE_BASE }}:dev

      - name: Run backend tests
        if: ${{ matrix.component == 'backend' }}
        run: |
          docker run --rm -e DJANGO_CI=true "${IMAGE_BASE}:dev" python -m pytest

      - name: Run frontend tests
        if: ${{ matrix.component == 'frontend' }}
        run: |
          docker run --rm -e CI=true "${IMAGE_BASE}:dev" npm test
          docker run --rm "${IMAGE_BASE}:dev" npx prettier --check .

      - name: Push dev image tags
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          docker push "${IMAGE_BASE}:dev"
