version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "weekly"
    ignore:
      # Stay on Django 5.2 LTS
      - dependency-name: "django"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
    ignore:
      # Stay on Python 3.12 — uWSGI crashes on 3.13+ due to PyMutex_Unlock
      # incompatibility with CPython's new mutex internals (free-threaded build).
      # See: https://github.com/unbit/uwsgi/issues/2688
      - dependency-name: "python"
        update-types:
          ["version-update:semver-major", "version-update:semver-minor"]
  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    ignore:
      # Stay on Node 22 LTS
      - dependency-name: "library/node"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
