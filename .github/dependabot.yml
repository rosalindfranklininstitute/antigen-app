version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "weekly"
    ignore:
      # Stay on Django 5.2 LTS
      - dependency-name: "django"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    ignore:
      # Stay on Node 22 LTS
      - dependency-name: "library/node"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
